<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Training</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Training"/>
  <meta name="theme-color" content="#1a5fd4"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;
  --card:#fff;
  --border:#e8e6e0;
  --text:#1a1a18;
  --text2:#6b6a66;
  --text3:#9b9a96;
  --blue:#1a5fd4;
  --blue-light:#e8f0fc;
  --green:#1a9e6e;
  --green-light:#e4f5ee;
  --red:#d43a1a;
  --amber:#c47800;
  --radius:10px;
  --radius-lg:14px;
}
body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:.75rem}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding:.5rem 0}
.hdr-title{font-size:20px;font-weight:700;letter-spacing:-.02em}
.mode-toggle{display:flex;background:var(--border);border-radius:99px;padding:3px;gap:2px}
.mode-btn{padding:5px 14px;border-radius:99px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;background:none;color:var(--text2);font-family:inherit;letter-spacing:.03em}
.mode-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.mode-btn.active.outdoor{color:#1a5fd4}
.mode-btn.active.indoor{color:#1a9e6e}

/* SCREENS */
.screen{display:none}.screen.on{display:block}

/* WEEK GRID */
.week-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem}
.day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:1rem}
.dp{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:7px 3px;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
.dp.sel.outdoor{background:var(--blue-light);border-color:#93b8f5}
.dp.sel.indoor{background:var(--green-light);border-color:#7ed4b0}
.dp.dov{border-width:2px;border-color:var(--blue)}
.dp.dra{opacity:.3}
.dp .dl{font-size:10px;color:var(--text3);font-family:sans-serif}
.dp.sel .dl{color:var(--blue)}
.dp.sel.indoor .dl{color:var(--green)}
.dp .dn{font-size:13px;font-weight:700;color:var(--text);margin-top:1px;font-family:sans-serif}
.dp .dt{font-size:9px;color:var(--text3);margin-top:2px;line-height:1.2;font-family:sans-serif}
.dp.sel.outdoor .dt{color:var(--blue)}
.dp.sel.indoor .dt{color:var(--green)}

/* SESSION CARD */
.sess-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:.75rem;position:relative;overflow:hidden}
.sess-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--blue)}
.sess-card.indoor::before{background:var(--green)}
.sess-mode-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);margin-bottom:.35rem;font-family:sans-serif}
.sess-mode-tag.indoor{color:var(--green)}
.sess-title{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.sess-sub{font-size:12px;color:var(--text2);margin-top:3px;font-family:sans-serif}
.meta-row{display:flex;gap:5px;margin-top:.6rem;flex-wrap:wrap}
.badge{background:var(--bg);border-radius:99px;padding:3px 10px;font-size:11px;color:var(--text2);font-family:sans-serif;border:1px solid var(--border)}

/* SECTION HDR */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin:.9rem 0 .4rem}
.sec-lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;font-family:sans-serif}
.txt-btn{background:none;border:none;color:var(--blue);font-size:12px;cursor:pointer;padding:0;font-family:sans-serif;font-weight:600}

/* EXERCISE CARDS */
.ex-list{display:flex;flex-direction:column;gap:5px}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.ex-hdr{display:flex;align-items:center;gap:8px;padding:9px 10px;cursor:pointer}
.ex-drag{cursor:grab;color:var(--text3);font-size:14px;padding:0 2px;font-family:sans-serif}
.ex-num{width:22px;height:22px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--blue);flex-shrink:0;font-family:sans-serif}
.ex-num.indoor{background:var(--green-light);color:var(--green)}
.ex-inf{flex:1;min-width:0}
.ex-nm{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.ex-dt{font-size:11px;color:var(--text2);margin-top:1px;font-family:sans-serif}
.ex-act{display:flex;gap:4px;align-items:center}
.icon-btn{background:none;border:none;cursor:pointer;font-size:14px;color:var(--text3);padding:2px;line-height:1}
.icon-btn.danger{color:var(--red)}
.chev{font-size:12px;color:var(--text3);transition:transform .2s;font-family:sans-serif}
.chev.op{transform:rotate(180deg)}
.ex-body{display:none;padding:0 10px 10px;font-family:sans-serif}
.ex-body.op{display:block}
.fig-row{display:flex;gap:12px;justify-content:center;margin:8px 0 10px;flex-wrap:wrap}
.fig-box{display:flex;flex-direction:column;align-items:center;gap:3px}
.fig-lbl{font-size:9px;color:var(--text3)}
.ex-desc{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:7px}
.cue{font-size:11px;color:var(--text2);padding:2px 0 2px 10px;position:relative}
.cue::before{content:'—';position:absolute;left:0;color:var(--blue)}
.cue.indoor::before{color:var(--green)}
.add-btn{width:100%;margin-top:.5rem;padding:9px;border:1px solid var(--blue);border-radius:var(--radius);background:none;color:var(--blue);font-size:13px;cursor:pointer;font-family:sans-serif;font-weight:600}
.add-btn.rem{border-color:var(--red);color:var(--red)}
.add-btn.indoor-btn{border-color:var(--green);color:var(--green)}

/* START BTN */
.start-btn{width:100%;margin-top:.75rem;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-lg);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.02em;transition:opacity .15s}
.start-btn:active{opacity:.85}
.start-btn.indoor{background:var(--green)}


.wake-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);border-radius:99px;padding:4px 10px 4px 6px;cursor:pointer;font-family:sans-serif;font-size:11px;font-weight:600;color:var(--text2);transition:all .2s}
.wake-toggle.active{background:var(--green-light);border-color:#7ed4b0;color:var(--green)}
.wake-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background .2s}
.wake-toggle.active .wake-dot{background:var(--green)}

/* BACK BTN */
.back-btn{background:none;border:none;color:var(--blue);font-size:13px;cursor:pointer;padding:0 0 .75rem;display:flex;align-items:center;gap:4px;font-family:sans-serif;font-weight:600}

/* PROGRESS */
.prog-wrap{background:var(--border);border-radius:99px;height:3px;margin-bottom:1rem;overflow:hidden}
.prog-bar{height:3px;background:var(--blue);border-radius:99px;transition:width .3s}
.prog-bar.indoor{background:var(--green)}

/* WORKOUT */
.w-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:.75rem}
.w-ex-nm{font-size:19px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.w-ex-st{font-size:13px;color:var(--text2);margin-top:3px;font-family:sans-serif}
.set-row{display:flex;gap:7px;margin:.75rem 0;flex-wrap:wrap}
.sdot{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--text2);transition:all .15s;font-family:sans-serif;font-weight:600}
.sdot.done{background:var(--blue);border-color:var(--blue);color:#fff}
.sdot.done.indoor{background:var(--green);border-color:var(--green)}
.timer-wrap{display:flex;flex-direction:column;align-items:center;margin:.75rem 0}
.t-circle{position:relative;width:100px;height:100px}
.t-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:700;color:var(--text)}
.t-lbl{font-size:11px;color:var(--text2);margin-top:4px;font-family:sans-serif}
.nav-row{display:flex;gap:7px;margin-top:.5rem}
.nav-btn{flex:1;padding:11px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);font-size:13px;color:var(--text);cursor:pointer;font-family:sans-serif;font-weight:600}
.nav-btn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}
.nav-btn.pri.indoor{background:var(--green);border-color:var(--green)}
.finish{text-align:center;padding:2rem 1rem}

/* POOL */
.pool-search{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--card);color:var(--text);margin-bottom:.5rem;font-family:sans-serif}
.pool-search:focus{outline:none;border-color:var(--blue)}
.muscle-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.5rem}
.mf{padding:4px 10px;border:1px solid var(--border);border-radius:99px;font-size:11px;color:var(--text2);cursor:pointer;background:var(--card);font-family:sans-serif;font-weight:600}
.mf.sel{background:var(--blue-light);border-color:#93b8f5;color:var(--blue)}
.mf.sel.indoor{background:var(--green-light);border-color:#7ed4b0;color:var(--green)}

/* INDOOR BANNER */
.indoor-banner{background:var(--green-light);border:1px solid #7ed4b0;border-radius:var(--radius);padding:8px 12px;margin-bottom:.75rem;font-size:11px;color:var(--green);font-family:sans-serif;font-weight:600;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<div class="app">

<div class="hdr">
  <div class="hdr-title">Training</div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="wake-toggle" id="wakeBtn" onclick="toggleWake()" title="Keep screen on during workout">
      <div class="wake-dot" id="wakeDot"></div>
      <span id="wakeLabel">Screen</span>
    </button>
    <div class="mode-toggle">
    <button class="mode-btn active outdoor" id="btnOutdoor" onclick="setMode('outdoor')">&#9728; Outdoor</button>
    <button class="mode-btn indoor" id="btnIndoor" onclick="setMode('indoor')">&#127960; Indoor</button>
  </div>
</div>
</div>

<div class="screen on" id="s-week">
  <p class="week-label">Weekly plan — drag to rearrange</p>
  <div class="day-grid" id="dayGrid"></div>
  <div id="dayDetail"></div>
</div>

<div class="screen" id="s-pool">
  <button class="back-btn" onclick="show('s-week')">&#8592; Back to plan</button>
  <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:.2rem;letter-spacing:-.01em" id="poolTitle"></div>
  <div style="font-size:11px;color:var(--text2);margin-bottom:.75rem;font-family:sans-serif">Tap to preview. Add or remove from session.</div>
  <input class="pool-search" placeholder="Search exercises..." oninput="filterPool(this.value)" id="poolSearch"/>
  <div class="muscle-filters" id="muscleFilters"></div>
  <div class="ex-list" id="poolList"></div>
</div>

<div class="screen" id="s-workout">
  <button class="back-btn" onclick="endWorkout()">&#8592; Back to plan</button>
  <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
  <div id="workoutContent"></div>
</div>

</div>

<script>
// ─── MODE ────────────────────────────────────────────────────────────────────
let mode = 'outdoor'; // 'outdoor' | 'indoor'

function setMode(m) {
  mode = m;
  document.getElementById('btnOutdoor').className = 'mode-btn' + (m==='outdoor'?' active outdoor':' outdoor');
  document.getElementById('btnIndoor').className = 'mode-btn' + (m==='indoor'?' active indoor':' indoor');
  renderWeek(); renderDay();
}

      {id:'deadbug_rec',name:'Dead bug — slow',muscle:'Core / recovery',sets:2,reps:'8 each side',rest:30,desc:'Very slow dead bug. 5 sec extension, 5 sec return. Pure core activation.',cues:['5 sec each way','Back into mat always','Breathe throughout'],figs:['deadbug']},
      {id:'hollow_rec',name:'Hollow body — short holds',muscle:'Core / recovery',sets:3,reps:'15 sec',rest:30,desc:'Short easy holds. Focus on position not duration.',cues:['Position over time','Back into mat','Easy effort only'],figs:['hollow']},
      {id:'breathing_stretch',name:'Progressive relaxation',muscle:'Recovery / nervous system',sets:1,reps:'15 min',rest:0,desc:'Lie on mat. Tense and release each muscle group from feet to head. Then 5 min box breathing.',cues:['Tense then fully release','Work feet to head','Finish with breathing'],figs:['hollow']}

};

// ─── STATE ────────────────────────────────────────────────────────────────────
let weekOrder = [0,1,2,3,4];
let sessionExercises = {
  outdoor: weekOrder.map(sid => POOL.outdoor[sid].slice(0,5).map(e => e.id)),
  indoor:  weekOrder.map(sid => POOL.indoor[sid].slice(0,5).map(e => e.id))
};
let currentDay = 0;
let dragSrcDay = null;
let dragSrcEx = null;
let workoutIdx = 0;
let setsDone = [];
let timerInt = null;
let timerSec = 0;
let poolFilter = '';
let poolMuscle = '';

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}
function getPool() { return POOL[mode]; }
function getSessions() { return SESSION_DEFS[mode]; }
function getSessionExs() { return sessionExercises[mode]; }
function getEx(dayIdx, id) { return getPool()[weekOrder[dayIdx]].find(e => e.id === id); }
function getDayExs(dayIdx) { return getSessionExs()[dayIdx].map(id => getEx(dayIdx, id)).filter(Boolean); }
function isIndoor() { return mode === 'indoor'; }

// ─── WEEK ─────────────────────────────────────────────────────────────────────
function renderWeek() {
  const g = document.getElementById('dayGrid'); g.innerHTML = '';
  weekOrder.forEach((sid, i) => {
    const s = getSessions()[sid];
    const d = document.createElement('div');
    d.className = 'dp' + (i === currentDay ? (' sel ' + mode) : '');
    d.draggable = true;
    d.innerHTML = `<div class="dl">${DAYS_ARR[i]}</div><div class="dn">D${i+1}</div><div class="dt">${s.tag}</div>`;
    d.onclick = () => { currentDay = i; renderWeek(); renderDay(); };
    d.ondragstart = e => { dragSrcDay = i; setTimeout(() => d.classList.add('dra'), 0); };
    d.ondragend = () => { d.classList.remove('dra'); document.querySelectorAll('.dp').forEach(x => x.classList.remove('dov')); };
    d.ondragover = e => { e.preventDefault(); d.classList.add('dov'); };
    d.ondragleave = () => d.classList.remove('dov');
    d.ondrop = e => {
      e.preventDefault(); d.classList.remove('dov');
      if (dragSrcDay !== null && dragSrcDay !== i) {
        [weekOrder[dragSrcDay], weekOrder[i]] = [weekOrder[i], weekOrder[dragSrcDay]];
        [sessionExercises.outdoor[dragSrcDay], sessionExercises.outdoor[i]] = [sessionExercises.outdoor[i], sessionExercises.outdoor[dragSrcDay]];
        [sessionExercises.indoor[dragSrcDay], sessionExercises.indoor[i]] = [sessionExercises.indoor[i], sessionExercises.indoor[dragSrcDay]];
        if (currentDay === dragSrcDay) currentDay = i; else if (currentDay === i) currentDay = dragSrcDay;
        renderWeek(); renderDay();
      }
      dragSrcDay = null;
    };
    g.appendChild(d);
  });
}

// ─── DAY ─────────────────────────────────────────────────────────────────────
function renderDay() {
  const sid = weekOrder[currentDay];
  const s = getSessions()[sid];
  const exs = getDayExs(currentDay);
  const ind = isIndoor();
  document.getElementById('dayDetail').innerHTML = `
    ${ind ? '<div class="indoor-banner">&#127960; Indoor mode — no outdoor equipment needed</div>' : ''}
    <div class="sess-card ${ind ? 'indoor' : ''}">
      <div class="sess-mode-tag ${ind ? 'indoor' : ''}">${ind ? '&#127960; Indoor' : '&#9728; Outdoor'}</div>
      <div class="sess-title">${s.name}</div>
      <div class="sess-sub">Warm-up: ${s.warmup}</div>
      <div class="meta-row">
        <span class="badge">${s.duration}</span>
        <span class="badge">${exs.length} exercises</span>
        <span class="badge">${s.tools}</span>
      </div>
    </div>
    <div class="sec-hdr">
      <span class="sec-lbl">Session exercises</span>
      <button class="txt-btn" onclick="openPool()">Edit pool +</button>
    </div>
    <div class="ex-list" id="exList"></div>
    <button class="start-btn ${ind ? 'indoor' : ''}" onclick="startWorkout()">Start session</button>
  `;
  renderExList();
}

function renderExList() {
  const exs = getDayExs(currentDay);
  const list = document.getElementById('exList');
  if (!list) return;
  const ind = isIndoor();
  list.innerHTML = '';
  exs.forEach((ex, i) => {
    const card = document.createElement('div');
    card.className = 'ex-card';
    card.innerHTML = `
      <div class="ex-hdr">
        <div class="ex-drag" draggable="true" data-i="${i}">&#8597;</div>
        <div class="ex-num ${ind ? 'indoor' : ''}">${i+1}</div>
        <div class="ex-inf">
          <div class="ex-nm">${ex.name}</div>
          <div class="ex-dt">${ex.muscle} · ${ex.sets} sets · ${ex.reps}</div>
        </div>
        <div class="ex-act">
          <button class="icon-btn danger" onclick="removeEx(event,${i})">&#10005;</button>
          <div class="chev" id="chev${i}">&#8964;</div>
        </div>
      </div>
      <div class="ex-body" id="exb${i}">
        <div class="fig-row">${ex.figs.map(f => `<div class="fig-box">${makeFig(f)}</div>`).join('')}</div>
        <div class="ex-desc">${ex.desc}</div>
        <div>${ex.cues.map(c => `<div class="cue ${ind ? 'indoor' : ''}">${c}</div>`).join('')}</div>
      </div>
    `;
    card.querySelector('.ex-hdr').onclick = e => {
      if (e.target.closest('.icon-btn') || e.target.closest('.ex-drag')) return;
      document.getElementById('exb' + i).classList.toggle('op');
      document.getElementById('chev' + i).classList.toggle('op');
    };
    const drag = card.querySelector('.ex-drag');
    drag.ondragstart = e => { dragSrcEx = i; e.dataTransfer.effectAllowed = 'move'; };
    card.ondragover = e => e.preventDefault();
    card.ondrop = e => {
      e.preventDefault();
      if (dragSrcEx !== null && dragSrcEx !== i) {
        const arr = getSessionExs()[currentDay];
        [arr[dragSrcEx], arr[i]] = [arr[i], arr[dragSrcEx]];
        dragSrcEx = null; renderExList();
      }
      dragSrcEx = null;
    };
    list.appendChild(card);
  });
}

function removeEx(e, i) { e.stopPropagation(); getSessionExs()[currentDay].splice(i, 1); renderExList(); }

// ─── POOL ─────────────────────────────────────────────────────────────────────
function openPool() {
  poolFilter = ''; poolMuscle = '';
  document.getElementById('poolTitle').textContent = getSessions()[weekOrder[currentDay]].name + ' — pool';
  document.getElementById('poolSearch').value = '';
  renderPoolFilters(); renderPool(); show('s-pool');
}

function renderPoolFilters() {
  const pool = getPool()[weekOrder[currentDay]];
  const muscles = [...new Set(pool.map(e => e.muscle.split(' / ')[0]))];
  const ind = isIndoor();
  document.getElementById('muscleFilters').innerHTML =
    `<div class="mf${poolMuscle === '' ? (' sel' + (ind ? ' indoor' : '')) : ''}" onclick="setMuscle('')">All</div>` +
    muscles.map(m => `<div class="mf${poolMuscle === m ? (' sel' + (ind ? ' indoor' : '')) : ''}" onclick="setMuscle('${m}')">${m}</div>`).join('');
}
function setMuscle(m) { poolMuscle = m; renderPoolFilters(); renderPool(); }
function filterPool(v) { poolFilter = v.toLowerCase(); renderPool(); }

function renderPool() {
  const pool = getPool()[weekOrder[currentDay]];
  const current = getSessionExs()[currentDay];
  const ind = isIndoor();
  document.getElementById('poolList').innerHTML = '';
  pool.filter(ex => {
    const mOk = poolMuscle === '' || ex.muscle.toLowerCase().includes(poolMuscle.toLowerCase());
    const sOk = poolFilter === '' || ex.name.toLowerCase().includes(poolFilter) || ex.muscle.toLowerCase().includes(poolFilter);
    return mOk && sOk;
  }).forEach(ex => {
    const added = current.includes(ex.id);
    const card = document.createElement('div');
    card.className = 'ex-card' + (added ? ' added' : '');
    card.innerHTML = `
      <div class="ex-hdr" onclick="togglePool(this,'${ex.id}')">
        <div class="ex-inf">
          <div class="ex-nm">${ex.name}</div>
          <div class="ex-dt">${ex.muscle} · ${ex.sets} sets · ${ex.reps}</div>
        </div>
        <div class="chev" id="pchev${ex.id}">&#8964;</div>
      </div>
      <div class="ex-body" id="pb${ex.id}">
        <div class="fig-row">${ex.figs.map(f => `<div class="fig-box">${makeFig(f)}</div>`).join('')}</div>
        <div class="ex-desc">${ex.desc}</div>
        <div>${ex.cues.map(c => `<div class="cue ${ind ? 'indoor' : ''}">${c}</div>`).join('')}</div>
        <button class="add-btn${added ? ' rem' : (ind ? ' indoor-btn' : '')}" onclick="toggleAdd('${ex.id}',event)">
          ${added ? 'Remove from session' : 'Add to session'}
        </button>
      </div>
    `;
    document.getElementById('poolList').appendChild(card);
  });
}

function togglePool(hdr, id) {
  document.getElementById('pb' + id).classList.toggle('op');
  document.getElementById('pchev' + id).classList.toggle('op');
}
function toggleAdd(id, e) {
  e.stopPropagation();
  const arr = getSessionExs()[currentDay];
  const idx = arr.indexOf(id);
  if (idx > -1) arr.splice(idx, 1); else arr.push(id);
  renderPool();
}

// ─── WORKOUT ──────────────────────────────────────────────────────────────────
function startWorkout() {
  workoutIdx = 0;
  const exs = getDayExs(currentDay);
  setsDone = exs.map(ex => Array(ex.sets).fill(false));
  show('s-workout');
  document.getElementById('progBar').className = 'prog-bar' + (isIndoor() ? ' indoor' : '');
  renderWorkoutEx();
}
function endWorkout() { clearTimer(); show('s-week'); renderDay(); }

function renderWorkoutEx() {
  clearTimer();
  const exs = getDayExs(currentDay);
  if (workoutIdx >= exs.length) { renderFinish(); return; }
  const ex = exs[workoutIdx];
  const ind = isIndoor();
  document.getElementById('progBar').style.width = Math.round((workoutIdx / exs.length) * 100) + '%';
  document.getElementById('workoutContent').innerHTML = `
    <div class="w-card">
      <div style="font-size:11px;color:var(--text3);margin-bottom:3px;font-family:sans-serif;font-weight:700;letter-spacing:.06em;text-transform:uppercase">
        ${ind ? '&#127960; Indoor · ' : '&#9728; Outdoor · '}Exercise ${workoutIdx+1} of ${exs.length}
      </div>
      <div class="w-ex-nm">${ex.name}</div>
      <div class="w-ex-st">${ex.sets} sets · ${ex.reps} · ${ex.rest}s rest</div>
      <div class="fig-row" style="margin:12px 0">${ex.figs.map(f => `<div class="fig-box">${makeFig(f)}</div>`).join('')}</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:10px;font-family:sans-serif">${ex.desc}</div>
      <div style="font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;font-family:sans-serif">Sets</div>
      <div class="set-row" id="setRow">
        ${setsDone[workoutIdx].map((d, i) => `<div class="sdot${d ? (' done' + (ind ? ' indoor' : '')) : ''}" onclick="markSet(${i})">${d ? '&#10003;' : i+1}</div>`).join('')}
      </div>
      <div id="timerArea"></div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevEx()">&#8592; Prev</button>
      <button class="nav-btn pri${ind ? ' indoor' : ''}" onclick="nextEx()">Next &#8594;</button>
    </div>
  `;
}

function markSet(si) {
  const ex = getDayExs(currentDay)[workoutIdx];
  const ind = isIndoor();
  setsDone[workoutIdx][si] = !setsDone[workoutIdx][si];
  document.getElementById('setRow').innerHTML = setsDone[workoutIdx]
    .map((d, i) => `<div class="sdot${d ? (' done' + (ind ? ' indoor' : '')) : ''}" onclick="markSet(${i})">${d ? '&#10003;' : i+1}</div>`)
    .join('');
  if (setsDone[workoutIdx].every(Boolean) && ex.rest > 0) startRest(ex.rest);
}

function startRest(s) {
  clearTimer(); timerSec = s; renderTimer();
  timerInt = setInterval(() => {
    timerSec--;
    if (timerSec <= 0) {
      clearTimer();
      document.getElementById('timerArea').innerHTML = `<div style="text-align:center;padding:10px;font-size:13px;color:${isIndoor() ? 'var(--green)' : 'var(--blue)'};font-weight:700;font-family:sans-serif">Rest done — go!</div>`;
    } else renderTimer();
  }, 1000);
}
function clearTimer() { if (timerInt) { clearInterval(timerInt); timerInt = null; } }

function renderTimer() {
  const area = document.getElementById('timerArea'); if (!area) return;
  const ex = getDayExs(currentDay)[workoutIdx];
  const frac = timerSec / ex.rest;
  const ind = isIndoor();
  const r = 44, cx = 52, cy = 52, circ = 2 * Math.PI * r;
  area.innerHTML = `<div class="timer-wrap">
    <div class="t-circle">
      <svg width="104" height="104" viewBox="0 0 104 104">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e8e6e0" stroke-width="6"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${ind ? 'var(--green)' : 'var(--blue)'}" stroke-width="6"
          stroke-dasharray="${(frac*circ).toFixed(1)} ${circ.toFixed(1)}"
          transform="rotate(-90 ${cx} ${cy})"/>
      </svg>
      <div class="t-num">${timerSec}</div>
    </div>
    <div class="t-lbl">Rest — next set coming up</div>
  </div>`;
}

function nextEx() { if (workoutIdx < getDayExs(currentDay).length - 1) { workoutIdx++; renderWorkoutEx(); } else renderFinish(); }
function prevEx() { if (workoutIdx > 0) { workoutIdx--; renderWorkoutEx(); } }

function renderFinish() {
  clearTimer();
  document.getElementById('progBar').style.width = '100%';
  const ind = isIndoor();
  document.getElementById('workoutContent').innerHTML = `
    <div class="finish">
      <div style="font-size:44px;margin-bottom:12px">&#10003;</div>
      <div style="font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.02em">Session complete</div>
      <div style="font-size:13px;color:var(--text2);margin-top:6px;font-family:sans-serif">${ind ? 'Good work — indoors counts.' : 'Good work.'}</div>
      <button class="nav-btn pri${ind ? ' indoor' : ''}" style="margin-top:1.5rem;width:100%" onclick="endWorkout()">Back to plan</button>
    </div>
  `;
}

  }
}

function stopWake() {
  if (wakeVideo) {
    wakeVideo.pause();
  }
  wakeActive = false;
  updateWakeUI();
}

function updateWakeUI() {
  const btn = document.getElementById('wakeBtn');
  const lbl = document.getElementById('wakeLabel');
  if (wakeActive) {
    btn.classList.add('active');
    lbl.textContent = 'Screen on';
  } else {
    btn.classList.remove('active');
    lbl.textContent = 'Screen';
  }
}


// ─── INIT ─────────────────────────────────────────────────────────────────────
renderWeek();
renderDay();
